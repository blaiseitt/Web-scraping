<mat-toolbar>
  <button mat-button
    [class.active]="activeRadio === 'eska'"
    (click)="selectRadio('eska')">
    ESKA
  </button>
  <button mat-button
    [class.active]="activeRadio === 'plus'"
    (click)="selectRadio('plus')">
    PLUS
  </button>
  <button mat-button 
    [class.active]="activeRadio === 'rmffm'"
    (click)="selectRadio('rmffm')">
    RMF FM
  </button>
  
  <span class="example-spacer"></span>

  <mat-form-field class="example-full-width">
    <mat-label>Piosenka</mat-label>
    <input matInput placeholder="Np. waka waka" value="">
  </mat-form-field>

</mat-toolbar>
